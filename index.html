<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>消灭星星 Pop Star</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=3, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a0a3c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="消灭星星" />
  <link rel="apple-touch-icon" href="img/icon-192.png" />
  <link rel="icon" type="image/ico" href="img/favicon.ico" />
  <style>
    @font-face {
      font-family: 'feltregular';
      src: url('font/markerfelt-webfont.woff') format('woff'),
           url('font/markerfelt-webfont.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      touch-action: none;
    }
    #game-canvas {
      display: block;
      position: absolute;
      top: 0; left: 0; right: 0;
      margin: 0 auto;
    }
    #loading {
      position: fixed;
      top: 40%;
      width: 100%;
      text-align: center;
      font: 7em 'feltregular', sans-serif;
      color: #fff;
      text-shadow: 0 0 10px #995ED1;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">Loading</div>
  <canvas id="game-canvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
